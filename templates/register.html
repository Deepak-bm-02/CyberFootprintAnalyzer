<!DOCTYPE html>

<html>

<head>

    <title>Register</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Create Account</h1>

<form method="POST">

<label>Name</label>

<input type="text"

name="name"

required>

<br><br>

<label>Email</label>

<input type="email"

name="email"

required>

<br><br>

<label>Password</label>

<input type="password"

name="password"

required>

<br><br>

<button type="submit">

Register

</button>

</form>

<br>

<a href="/login">

Already have account?

Login

</a>

</div>

</body>

</html>
